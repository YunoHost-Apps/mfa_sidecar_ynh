version: 1
portal:
  domain: auth.example.tld
  path: /
  default_redirect_url: https://yunohost.example.tld/
  listen:
    host: 127.0.0.1
    port: 9091
session:
  name: mfa_sidecar_session
  secret_env: AUTHELIA_SESSION_SECRET
  expiration: 24h
  inactivity: 1h
  remember_me: 24h
storage:
  encryption_key_env: AUTHELIA_STORAGE_ENCRYPTION_KEY
identity:
  display_name: YunoHost LDAP
  ldap:
    address: ldap://127.0.0.1:389
    implementation: custom
    start_tls: false
    permit_referrals: false
    permit_unauthenticated_bind: false
    base_dn: dc=yunohost,dc=org
    additional_users_dn: ou=users
    additional_groups_dn: ou=groups
    users_filter: (&({username_attribute}={input})(objectClass=inetOrgPerson))
    groups_filter: (&(member={dn})(objectClass=groupOfNamesYnh))
    group_search_mode: filter
    username_attribute: uid
    display_name_attribute: cn
    mail_attribute: mail
    user: uid=authelia,ou=users,dc=yunohost,dc=org
    password_env: AUTHELIA_LDAP_PASSWORD
mfa:
  issuer: MFA Sidecar
  webauthn:
    enabled: true
    display_name: YunoHost MFA
    attestation_conveyance_preference: indirect
    user_verification: preferred
    timeout: 60s
  totp:
    enabled: true
    issuer: MFA Sidecar
access_control:
  default_policy: bypass
  managed_sites:
    - id: root_site
      label: Root site
      host: wm3v.com
      path: /
      enabled: true
      upstream: https://127.0.0.1:443
    - id: nextcloud_exception
      label: Nextcloud exception
      host: wm3v.com
      path: /nextcloud
      enabled: false
      upstream: https://127.0.0.1:443
    - id: nextcloud_deeper_override
      label: Morestuff override
      host: wm3v.com
      path: /nextcloud/apps/files/morestuff
      enabled: true
      upstream: https://127.0.0.1:443
    - id: homebox
      label: HomeBox
      host: home.example.tld
      path: /
      enabled: false
      upstream: http://127.0.0.1:3000
recovery:
  mode: authelia-reset-password-and-enrollment
  disable_reset: false
alpha:
  generate_nginx_snippets: true
  generate_authelia_config: true
  enforce_tls_upstream_verification: false
