version: 1
portal:
  domain: auth.example.tld
  path: /
  default_redirect_url: https://yunohost.example.tld/
  listen:
    host: 127.0.0.1
    port: 9091
session:
  name: mfa_sidecar_session
  secret_env: AUTHELIA_SESSION_SECRET
  expiration: 24h
  inactivity: 1h
  remember_me: 24h
storage:
  encryption_key_env: AUTHELIA_STORAGE_ENCRYPTION_KEY
identity:
  display_name: MFA Sidecar
  local:
    path: /etc/mfa-sidecar/authelia/users.yml
    watch: false
    search:
      email: true
      case_insensitive: true
    password:
      algorithm: argon2
      argon2:
        variant: argon2id
        iterations: 3
        memory: 65536
        parallelism: 4
        key_length: 32
        salt_length: 16
  sync:
    enabled: false
    source: yunohost-ldap-readonly
    fields:
      - username
      - email
mfa:
  issuer: MFA Sidecar
  webauthn:
    enabled: true
    display_name: YunoHost MFA
    attestation_conveyance_preference: indirect
    user_verification: preferred
    timeout: 60s
  totp:
    enabled: true
    issuer: MFA Sidecar
access_control:
  default_policy: bypass
  managed_sites:
    - id: root_site
      label: Root site
      host: wm3v.com
      path: /
      enabled: true
      upstream: https://127.0.0.1:443
    - id: nextcloud_exception
      label: Nextcloud exception
      host: wm3v.com
      path: /nextcloud
      enabled: false
      upstream: https://127.0.0.1:443
    - id: nextcloud_deeper_override
      label: Morestuff override
      host: wm3v.com
      path: /nextcloud/apps/files/morestuff
      enabled: true
      upstream: https://127.0.0.1:443
    - id: homebox
      label: HomeBox
      host: home.example.tld
      path: /
      enabled: false
      upstream: http://127.0.0.1:3000
recovery:
  mode: authelia-reset-password-and-enrollment
  disable_reset: false
alpha:
  generate_nginx_snippets: true
  generate_authelia_config: true
  enforce_tls_upstream_verification: false
