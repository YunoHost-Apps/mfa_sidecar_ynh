#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "mfa_sidecar"
name = "MFA Sidecar"
description.en = "Browser-first MFA perimeter layer for selected YunoHost web apps"
description.fr = "Couche périmétrique MFA orientée navigateur pour des applications web YunoHost sélectionnées"

version = "0.1.2~ynh2"
maintainers = []

[upstream]
license = "AGPL-3.0-or-later"
website = "https://github.com/authelia/authelia"
code = "https://github.com/authelia/authelia"
documentation = "https://www.authelia.com/"

[integration]
yunohost = ">= 11.2.30"
helpers_version = "2.1"
architectures = "all"
multi_instance = false
ldap = "not_relevant"
sso = "not_relevant"
disk = "200M"
ram.build = "100M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"
    help.en = "Dedicated domain for the sidecar portal only (must not be shared with another app), for example auth.example.tld"
    help.fr = "Domaine dédié uniquement au portail sidecar (ne doit pas être partagé avec une autre app), par exemple auth.example.tld"

    [install.path]
    type = "path"
    default = "/"
    help.en = "Must remain '/' because the sidecar portal requires its own dedicated domain"
    help.fr = "Doit rester '/' car le portail sidecar nécessite son propre domaine dédié"

    [install.portal_subdomain]
    ask.en = "Portal subdomain label"
    ask.fr = "Étiquette du sous-domaine portail"
    type = "string"
    default = "auth"
    help.en = "Used for generated examples and future protected-domain redirects"
    help.fr = "Utilisé pour les exemples générés et les futures redirections des domaines protégés"

    [install.default_policy]
    ask.en = "Default policy for newly added domains"
    ask.fr = "Politique par défaut pour les nouveaux domaines ajoutés"
    type = "select"
    choices.open = "Public by default"
    choices.protected = "Protected by default"
    default = "open"

    [install.session_duration]
    ask.en = "Remembered session duration"
    ask.fr = "Durée de session mémorisée"
    type = "select"
    choices.8h = "8 hours"
    choices.24h = "24 hours"
    choices.168h = "7 days"
    choices.336h = "14 days"
    choices.720h = "30 days"
    default = "24h"

    [install.upstream_scheme]
    ask.en = "Default upstream scheme"
    ask.fr = "Schéma amont par défaut"
    type = "select"
    choices.http = "http"
    choices.https = "https"
    default = "https"

    [install.upstream_host]
    ask.en = "Default upstream host or IP"
    ask.fr = "Hôte ou IP amont par défaut"
    type = "string"
    default = "127.0.0.1"
    help.en = "Initial generated policy will route protected domains here unless edited later"
    help.fr = "La politique générée initiale pointera ici pour les domaines protégés tant qu'elle n'est pas modifiée"

    [install.upstream_port]
    ask.en = "Default upstream port"
    ask.fr = "Port amont par défaut"
    type = "string"
    default = "443"
    help.en = "Plain numeric TCP port; validated during install"
    help.fr = "Port TCP numérique simple ; validé pendant l'installation"

    [install.first_username]
    ask.en = "First sidecar admin username"
    ask.fr = "Nom d'utilisateur du premier admin du sidecar"
    type = "string"
    help.en = "Required. This user is created during install so the portal is immediately usable."
    help.fr = "Obligatoire. Cet utilisateur est créé pendant l'installation afin que le portail soit immédiatement utilisable."

    [install.first_display_name]
    ask.en = "First sidecar admin display name"
    ask.fr = "Nom affiché du premier admin du sidecar"
    type = "string"
    help.en = "Required. Human-friendly display name for the first sidecar admin."
    help.fr = "Obligatoire. Nom affiché lisible pour le premier admin du sidecar."

    [install.first_email]
    ask.en = "First sidecar admin email"
    ask.fr = "E-mail du premier admin du sidecar"
    type = "email"
    help.en = "Required. Email address for the first sidecar admin."
    help.fr = "Obligatoire. Adresse e-mail du premier admin du sidecar."

    [install.first_password]
    ask.en = "First sidecar admin password"
    ask.fr = "Mot de passe du premier admin du sidecar"
    type = "password"
    help.en = "Required. Password used to create the first sidecar admin during install."
    help.fr = "Obligatoire. Mot de passe utilisé pour créer le premier admin du sidecar pendant l'installation."

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.system_user]

    [resources.install_dir]
    dir = "/opt/yunohost/$app"

    [resources.data_dir]
    dir = "/var/lib/$app"

    [resources.apt]
    packages = ["python3", "python3-yaml", "openssl"]

    [resources.permissions]
    main.url = "/"
    main.allowed = "visitors"
    main.auth_header = false

    admin.url = "/admin"
    admin.allowed = "admins"
    admin.show_tile = false
    admin.auth_header = false
    admin.protected = true
