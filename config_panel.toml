version = "1.0"

[main]
name.en = "MFA Sidecar"
name.fr = "MFA Sidecar"
services = ["nginx"]

    [main.portal]
    name.en = "Portal"
    name.fr = "Portail"

        [main.portal.operator_model]
        ask.en = "Operator model"
        ask.fr = "Modèle opérateur"
        type = "alert"
        style = "info"
        bind = "null"
        readonly = true

        [main.portal.runtime_summary]
        ask.en = "Runtime summary"
        ask.fr = "Résumé du runtime"
        type = "alert"
        style = "info"
        bind = "null"
        readonly = true

        [main.portal.admin_url]
        ask.en = "Admin UI"
        ask.fr = "Interface d'administration"
        type = "alert"
        style = "info"
        bind = "null"
        readonly = true

        [main.portal.default_policy]
        ask.en = "Default policy for newly added sites"
        ask.fr = "Politique par défaut pour les nouveaux sites ajoutés"
        type = "select"
        choices.open = "Public by default"
        choices.protected = "Protected by default"
        bind = "null"

        [main.portal.session_duration]
        ask.en = "Remembered session duration"
        ask.fr = "Durée de session mémorisée"
        type = "select"
        choices.8h = "8 hours"
        choices.24h = "24 hours"
        choices.168h = "7 days"
        choices.336h = "14 days"
        choices.720h = "30 days"
        bind = "null"

    [main.upstream]
    name.en = "Default upstream"
    name.fr = "Amont par défaut"

        [main.upstream.upstream_scheme]
        ask.en = "Default upstream scheme"
        ask.fr = "Schéma amont par défaut"
        type = "select"
        choices.http = "http"
        choices.https = "https"
        bind = "null"

        [main.upstream.upstream_host]
        ask.en = "Default upstream host or IP"
        ask.fr = "Hôte ou IP amont par défaut"
        type = "string"
        bind = "null"

        [main.upstream.upstream_port]
        ask.en = "Default upstream port"
        ask.fr = "Port amont par défaut"
        type = "string"
        bind = "null"

        [main.upstream.save_upstream_defaults]
        type = "button"
        ask.en = "Save upstream defaults"
        ask.fr = "Enregistrer les valeurs amont par défaut"

    [main.operations]
    name.en = "Operations"
    name.fr = "Opérations"

        [main.operations.reload_runtime]
        type = "button"
        ask.en = "Reload runtime"
        ask.fr = "Recharger le runtime"

        [main.operations.emergency_disable]
        type = "button"
        ask.en = "Emergency disable"
        ask.fr = "Désactivation d'urgence"

        [main.operations.restart_services]
        type = "button"
        ask.en = "Restart services"
        ask.fr = "Redémarrer les services"

    [main.users]
    name.en = "User management"
    name.fr = "Gestion des utilisateurs"

        [main.users.users_file_note]
        type = "alert"
        style = "info"
        ask.en = "MFA Sidecar keeps its own users file. The first admin was created during install. Prefer /admin/users for routine management. Treat the raw users file as a recovery/debug surface, not a normal config-panel view."
        ask.fr = "MFA Sidecar conserve son propre fichier utilisateurs. Le premier admin a été créé pendant l'installation. Préférez /admin/users pour la gestion courante. Traitez le fichier utilisateurs brut comme une surface de récupération/débogage, pas comme une vue normale du panneau de configuration."
        bind = "null"

        [main.users.first_username]
        ask.en = "Username"
        ask.fr = "Nom d'utilisateur"
        type = "string"
        bind = "null"

        [main.users.first_display_name]
        ask.en = "Display name"
        ask.fr = "Nom affiché"
        type = "string"
        bind = "null"

        [main.users.first_email]
        ask.en = "Email"
        ask.fr = "E-mail"
        type = "email"
        bind = "null"

        [main.users.first_password]
        ask.en = "Password"
        ask.fr = "Mot de passe"
        type = "password"
        bind = "null"

        [main.users.seed_first_user]
        type = "button"
        ask.en = "Create or update sidecar user"
        ask.fr = "Créer ou mettre à jour un utilisateur du sidecar"

        [main.users.sync_users_from_yunohost]
        type = "button"
        ask.en = "Sync users from YunoHost"
        ask.fr = "Synchroniser les utilisateurs depuis YunoHost"
